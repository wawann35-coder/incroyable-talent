<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Incroyable Talent - Vote</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Container principal */
.container {
    width: 92%;
    max-width: 550px;
    background: rgba(20, 20, 20, 0.85);
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
    position: relative;
    overflow: hidden;
}

/* effet lumière scène */
.container::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.08), transparent 60%);
    animation: glow 6s infinite linear;
}

@keyframes glow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h1 {
    text-align: center;
    font-size: 30px;
    margin-bottom: 5px;
    color: gold;
    letter-spacing: 1px;
}

h3 {
    text-align: center;
    font-weight: 400;
    color: #ddd;
    margin-bottom: 20px;
}

/* Options */
.option {
    display: flex;
    align-items: center;
    padding: 12px;
    margin: 10px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    border: 1px solid rgba(255,215,0,0.08);
    cursor: pointer;
    transition: 0.25s;
}

.option:hover {
    transform: scale(1.03);
    background: rgba(255, 215, 0, 0.08);
    border-color: rgba(255, 215, 0, 0.3);
}

.option input {
    margin-right: 12px;
    transform: scale(1.2);
    accent-color: gold;
}

/* Bouton */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ffd700, #ffb300);
    color: #111;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
    letter-spacing: 1px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(255, 215, 0, 0.25);
}

button:active {
    transform: scale(0.98);
}

/* messages */
#msg {
    margin-top: 10px;
    text-align: center;
    color: #ffcc66;
}

/* écran merci */
#thanks {
    text-align: center;
}

#thanks h2 {
    color: gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🎭 Incroyable Talent</h1>
<h3>Vote pour ton finaliste</h3>

<div id="vote">

<div class="option"><input type="radio" name="v" value="Sania"> Sania</div>
<div class="option"><input type="radio" name="v" value="Les Mickaels"> Les Mickaels</div>
<div class="option"><input type="radio" name="v" value="Timéo"> Timéo</div>
<div class="option"><input type="radio" name="v" value="Ambre"> Ambre</div>
<div class="option"><input type="radio" name="v" value="Jana"> Jana</div>
<div class="option"><input type="radio" name="v" value="M. Penin"> M. Penin</div>
<div class="option"><input type="radio" name="v" value="Erik"> Erik</div>
<div class="option"><input type="radio" name="v" value="Farès et Wassim"> Farès et Wassim</div>
<div class="option"><input type="radio" name="v" value="Firouza"> Firouza</div>
<div class="option"><input type="radio" name="v" value="Mathis, Brian et Rayan"> Mathis, Brian et Rayan</div>

<button onclick="sendVote()">VOTER</button>

<p id="msg"></p>

</div>

<div id="thanks" class="hidden">
<h2>🎉 Merci pour ton vote !</h2>
<p>Ton vote a bien été enregistré.</p>
</div>

</div>

<script>

const COOLDOWN = 20 * 60 * 1000;

function getLastVoteTime() {
    return localStorage.getItem("lastVoteTime");
}

function setLastVoteTime() {
    localStorage.setItem("lastVoteTime", Date.now());
}

function checkCooldown() {
    let last = getLastVoteTime();
    if (!last) return false;
    return (Date.now() - parseInt(last)) < COOLDOWN;
}

function getRemainingTime() {
    let last = parseInt(getLastVoteTime());
    let remaining = COOLDOWN - (Date.now() - last);
    let minutes = Math.floor(remaining / 60000);
    let seconds = Math.floor((remaining % 60000) / 1000);
    return `${minutes}m ${seconds}s`;
}

function sendVote() {

    if (checkCooldown()) {
        document.getElementById("msg").innerText =
            "⏳ Attends encore " + getRemainingTime();
        return;
    }

    let choice = document.querySelector('input[name="v"]:checked');

    if (!choice) {
        document.getElementById("msg").innerText = "Choisis un candidat";
        return;
    }

    let results = JSON.parse(localStorage.getItem("results")) || {};

    results[choice.value] = (results[choice.value] || 0) + 1;

    localStorage.setItem("results", JSON.stringify(results));
    setLastVoteTime();

    document.getElementById("vote").classList.add("hidden");
    document.getElementById("thanks").classList.remove("hidden");
}

</script>

</body>
</html>
