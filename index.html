<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Incroyable Talent - Live Show</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top, #0d0d0d, #000);
    overflow-x: hidden;
    color: white;
}

/* SPOTLIGHT BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,215,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,215,0,0.06), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04), transparent 50%);
    animation: moveLights 8s infinite alternate;
}

@keyframes moveLights {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#intro h1 {
    color: gold;
    font-size: 44px;
    animation: zoomIn 1.5s ease;
}

#intro p {
    color: #aaa;
    margin-top: 10px;
    animation: fadeIn 2s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.2); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* LIVE */
.live {
    position: fixed;
    top: 15px;
    right: 15px;
    background: red;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: bold;
    animation: blink 1s infinite, pulse 2s infinite;
    z-index: 10;
}

@keyframes blink {
    50% { opacity: 0.4; }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* CONTAINER */
.container {
    width: 92%;
    max-width: 560px;
    margin: 100px auto;
    background: rgba(15,15,15,0.92);
    padding: 25px;
    border-radius: 18px;
    border: 1px solid rgba(255,215,0,0.25);
    box-shadow: 0 0 50px rgba(255,215,0,0.1);
    position: relative;
    z-index: 2;
}

h1 {
    text-align: center;
    color: gold;
    letter-spacing: 1px;
}

.option {
    display: flex;
    align-items: center;
    padding: 12px;
    margin: 10px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    transform: scale(1.03);
    background: rgba(255,215,0,0.1);
}

.option input {
    margin-right: 10px;
    transform: scale(1.2);
    accent-color: gold;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, gold, orange);
    font-weight: 800;
    cursor: pointer;
}

#msg {
    text-align: center;
    margin-top: 10px;
    color: #ffcc66;
}

.hidden { display: none; }

#thanks {
    text-align: center;
    animation: fadeIn 1s ease;
}

/* FLASH EFFECT */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}

.flash.active {
    animation: flashAnim 0.4s ease;
}

@keyframes flashAnim {
    0% { opacity: 0; }
    50% { opacity: 0.8; }
    100% { opacity: 0; }
}

</style>
</head>

<body>

<div id="intro">
    <h1>🎭 LES BOUVETS ONT UN INCROYABLE TALENT</h1>
    <p>Préparation du vote...</p>
</div>

<div class="live">🔴 LIVE TV</div>

<div class="flash" id="flash"></div>

<div class="container">

<h1>Vote pour ton finaliste</h1>

<div id="vote">

<div class="option"><input type="radio" name="v" value="Sania"> Sania</div>
<div class="option"><input type="radio" name="v" value="Les Mickaels"> Les Mickaels</div>
<div class="option"><input type="radio" name="v" value="Timéo"> Timéo</div>
<div class="option"><input type="radio" name="v" value="Ambre"> Ambre</div>
<div class="option"><input type="radio" name="v" value="Jana"> Jana</div>
<div class="option"><input type="radio" name="v" value="M. Penin"> M. Penin</div>
<div class="option"><input type="radio" name="v" value="Erik"> Erik</div>
<div class="option"><input type="radio" name="v" value="Farès et Wassim"> Farès et Wassim</div>
<div class="option"><input type="radio" name="v" value="Firouza"> Firouza</div>
<div class="option"><input type="radio" name="v" value="Mathis, Brian et Rayan"> Mathis, Brian et Rayan</div>

<button onclick="sendVote()">VOTER EN DIRECT</button>

<p id="msg"></p>

</div>

<div id="thanks" class="hidden">
<h2>🎉 Vote enregistré !</h2>
<p>Merci d'avoir participé ! </p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const VOTED_KEY = "agt_voted_full";
const RESULTS_KEY = "agt_results_full";

/* INTRO SOUND */
setTimeout(() => {
    document.getElementById("intro").style.display = "none";
}, 3500);

/* BUZZER */
function playBuzzer() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(120, ctx.currentTime);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    setTimeout(() => osc.stop(), 300);
}

/* CONFETTIS */
function launchConfetti() {
    confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
    });
}

/* FLASH */
function flashScreen() {
    const flash = document.getElementById("flash");
    flash.classList.add("active");
    setTimeout(() => flash.classList.remove("active"), 400);
}

/* VOTE LOCK */
function hasVoted() {
    return localStorage.getItem(VOTED_KEY) === "true";
}

function markVoted() {
    localStorage.setItem(VOTED_KEY, "true");
}

/* VOTE */
function sendVote() {

    if (hasVoted()) {
        document.getElementById("msg").innerText =
            "❌ Tu as déjà voté sur cet appareil.";
        return;
    }

    let choice = document.querySelector('input[name="v"]:checked');

    if (!choice) {
        document.getElementById("msg").innerText = "Choisis un candidat";
        return;
    }

    let results = JSON.parse(localStorage.getItem(RESULTS_KEY)) || {};
    results[choice.value] = (results[choice.value] || 0) + 1;

    localStorage.setItem(RESULTS_KEY, JSON.stringify(results));

    markVoted();

    playBuzzer();
    launchConfetti();
    flashScreen();

    document.getElementById("vote").classList.add("hidden");
    document.getElementById("thanks").classList.remove("hidden");
}

window.onload = function() {
    if (hasVoted()) {
        document.getElementById("vote").innerHTML =
            "<h3>❌ Tu as déjà voté. </h3>";
    }
};

</script>

</body>
</html>
